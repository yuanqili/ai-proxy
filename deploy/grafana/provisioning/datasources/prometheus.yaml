apiVersion: 1

# Provisioned declaratively — overrides any matching UI-created datasource
# with the same `name`. See docs/Deployment section in README for how this
# file is mounted into the Grafana container on the server.

# Remove a pre-existing Prometheus datasource created via the UI before
# inserting the provisioned one. Otherwise Grafana fails with
# "data source not found" when the UID we want to pin is already in use
# by a different row.
deleteDatasources:
  - name: Prometheus
    orgId: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s
      httpMethod: POST
